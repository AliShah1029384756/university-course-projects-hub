<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Communication System | University Projects Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--border:#ffffff14;--accent:#00d4ff;--text:#e8e8f0;--muted:#9aa1b5}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif}
.wrap{max-width:920px;margin:0 auto;padding:3rem 1.2rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:2rem}
.badge{display:inline-block;padding:.3rem .8rem;border:1px solid #00d4ff44;border-radius:999px;color:var(--accent);font-size:.75rem;letter-spacing:.08em;text-transform:uppercase}
h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.2rem);margin:.9rem 0 .5rem}
p{color:var(--muted);line-height:1.7}
.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.8rem;margin:1rem 0 1.3rem}
.meta div{background:#ffffff05;border:1px solid var(--border);border-radius:12px;padding:.9rem}
.meta strong{display:block;color:#fff;font-family:'Syne',sans-serif;font-size:.85rem}
.actions{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:1.2rem}
a.btn{display:inline-block;padding:.7rem 1.1rem;border-radius:10px;text-decoration:none;font-weight:700}
.btn.primary{background:var(--accent);color:#06141a}.btn.secondary{border:1px solid var(--border);color:var(--text)}
</style>
</head>
<body>
  <main class="wrap">
    <article class="card">
      <span class="badge">Networking</span>
      <h1>P2P Communication System</h1>
      <p>Peer-to-peer communication workflow with protocol-level design.</p>
      <section class="meta">
        <div><strong>Domain</strong><span>Networking</span></div>
        <div><strong>Tech Stack</strong><span>C++, Sockets, Networking</span></div>
      </section>
      <div class="actions">
        <a class="btn primary" href="https://github.com/AliShah1029384756/p2p-network">View Code</a>
        <a class="btn secondary" href="../index.html">Back to University Hub</a>
        <a class="btn secondary" href="https://alishah1029384756.github.io/AliShah1029384756/sites.html">Sites Directory</a>
      </div>
    </article>
  </main>
</body>
</html>
